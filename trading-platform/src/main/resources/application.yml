server:
  port: 8080

spring:
  application:
    name: trading-platform

  security:
    user:
      name: disabled
      password: disabled

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trading_platform}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

encryption:
  key: ${ENCRYPTION_KEY:}

jwt:
  secret: ${JWT_SECRET:TradePlatformDefaultSecretKeyForDevelopmentOnlyChangeInProduction2024}
  expiration-hours: 24

angelone:
  api-key: ${ANGELONE_API_KEY:}
  client-code: ${ANGELONE_CLIENT_CODE:}
  password: ${ANGELONE_PASSWORD:}
  totp-secret: ${ANGELONE_TOTP_SECRET:}
  base-url: https://apiconnect.angelone.in
  client-local-ip: ${ANGELONE_LOCAL_IP:192.168.1.1}
  client-public-ip: ${ANGELONE_PUBLIC_IP:106.193.147.98}
  mac-address: ${ANGELONE_MAC_ADDRESS:fe80::216e:6507:4b90:3719}

logging:
  level:
    com.tradingplatform: DEBUG
